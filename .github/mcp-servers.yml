# MCP servers for Copilot/Dev tools
# This file configures MCP servers that can be launched for development/inspection.
servers:
  - name: next-devtools-mcp
    package: "next-devtools-mcp@latest"
    description: "Next.js Devtools MCP server for the apps/web Next.js application"
    workspace: "apps/web"
    start: "yarn workspace @ticketing-billing/web dev"
    ports: [3000]
    env:
      NODE_ENV: development
